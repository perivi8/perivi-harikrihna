<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Responsive Project Cards</title>

  <!-- Bootstrap & Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

  <style>
    body {
      background-color: #000000;
      color: white;
    }

    .project-card {
      background-color: #000;
      border-radius: 12px;
      overflow: hidden;
      height: 100%;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: slideUp 0.8s ease-out forwards;
      opacity: 0;
    }

    .project-card:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
    }

    /* Staggered animation delays for each card */
    .project-card:nth-child(1) { animation-delay: 0.1s; }
    .project-card:nth-child(2) { animation-delay: 0.2s; }
    .project-card:nth-child(3) { animation-delay: 0.3s; }

    .project-image {
      width: 100%;
      height: 250px;
      object-fit: fill;
    }

    .project-footer {
      padding: 15px;
      background-color: #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .project-title {
      font-size: 1.2rem;
      font-weight: bold;
    }

    .project-footer .icons a {
      color: white;
      font-size: 1.3rem;
      margin-left: 15px;
      transition: color 0.3s;
    }

    .project-footer .icons a:hover {
      color: #00ffff;
    }

    /* Different card shadow colors for identity */
    .green-shadow:hover { box-shadow: 0 0 20px #ff921e; }
    .purple-shadow:hover { box-shadow: 0 0 20px #b2b5e3; }
    .red-shadow:hover { box-shadow: 0 0 20px #0026ff; }

    .title {
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 20px;
      text-align: center;
    }

    .title span {
      background: linear-gradient(to right, #00aaff, #ff4e50);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Social Icons - Centered Below */
    .social-icons {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 25px;
    }

    /* Social Icons Hover Effects */
    .social-icons a {
      text-decoration: none;
      transition: transform 0.3s ease-in-out;
    }

    .social-icons i {
      font-size: 36px;
      color: rgb(120 120 120 / 69%);
    }

    /* Hover Animations */
    .social-icons a:hover {
      transform: scale(1.2);
    }

    .social-icons .linkedin:hover i {
      color: #0077b5;
    }

    .social-icons .github:hover i {
      color: #333;
    }

    .social-icons .twitter:hover i {
      color: #1da1f2;
    }

    .social-icons .instagram:hover i {
      color: #e4405f;
    }

    .social-icons .youtube:hover i {
      color: #ff0000;
    }

    /* Keyframes for slide-up animation */
    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
<div class="container py-5">
  <div class="row g-4">
    <app-header></app-header>
    <h1 class="title"><span>Projects</span></h1>
    <!-- Card 1 -->
    <div class="col-12 col-md-6">
      <div class="project-card green-shadow">
        <img src="../assets/crop.png" alt="Crop Recommendation" class="project-image" />
        <div class="project-footer">
          <span class="project-title text-success">Agricultural Crop Recommendation</span>
          <div class="icons d-flex">
            <a href="https://github.com/perivi8/Crop_Frontend" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://github.com/perivi8/Crop_Backend" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://crop-frontend-hj58.vercel.app/" target="_blank"><i class="fas fa-external-link-alt"></i></a>
          </div>
        </div>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="col-12 col-md-6">
      <div class="project-card purple-shadow">
        <img src="../assets/movie.png" alt="AI Meetup" class="project-image" />
        <div class="project-footer">
          <span class="project-title text-purple">Movie Application</span>
          <div class="icons d-flex">
            <a href="https://github.com/perivi8/Movie-Application" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://movie-application-delta-five.vercel.app/" target="_blank"><i class="fas fa-external-link-alt"></i></a>
          </div>
        </div>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="col-12 col-md-6">
      <div class="project-card red-shadow">
        <img src="../assets/chain-management.png" alt="Burger Order" class="project-image" />
        <div class="project-footer">
          <span class="project-title text-danger">Supply Chain Management System for Medicines</span>
          <div class="icons d-flex">
            <a href="https://github.com/perivi8/Medical-Supply-Chain"><i class="fab fa-github"></i></a>
            <a href="https://github.com/perivi8/suply_chain_backend"><i class="fab fa-github"></i></a>
            <a href="https://medical-supply-chain.vercel.app/"><i class="fas fa-external-link-alt"></i></a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="social-icons">
  <a href="https://www.linkedin.com/in/perivi-harikrishna-ab633324a/" target="_blank" class="linkedin">
    <i class="fa-brands fa-linkedin"></i>
  </a>
  <a href="https://github.com/perivi8" target="_blank" class="github">

  <a href="https://www.instagram.com/toxic_hari_2002?igsh=MWJiaGY4Z3JlcGtwOQ%3D%3D&utm_source=qr" target="_blank" class="instagram">
    <i class="fa-brands fa-instagram"></i>
  </a>
  <a href="https://www.youtube.com/@NOOBS-777" target="_blank" class="youtube">
    <i class="fa-brands fa-youtube"></i>
  </a>
</div>
<app-footer></app-footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
