<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Certifications</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            background: #000;
            color: white;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
            text-align: center;
        }

        .title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .title span {
            background: linear-gradient(to right, #00aaff, #ff4e50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-title {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 40px;
            text-transform: uppercase;
            border-bottom: 2px solid #ff4e50;
            display: inline-block;
            padding-bottom: 5px;
        }

        .timeline {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
            margin: 40px auto;
        }

        .timeline-item {
            width: calc(33.33% - 20px); /* Three items per row */
            padding: 15px;
            opacity: 0;
            transform: translateY(50px);
            animation: fadeInUp 1s ease-in-out forwards;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cert-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .box1 { box-shadow: 0 0 30px yellow; }
        /* .box2 { box-shadow: 0 0 30px orange; }
        .box3 { box-shadow: 0 0 30px rgb(255, 0, 255); } */
        .box4 { box-shadow: 0 0 30px rgb(255, 255, 255); }
        .box5 { box-shadow: 0 0 30px rgb(0, 255, 128); }

        @media (max-width: 768px) {
            .timeline-item { width: calc(50% - 20px); } /* Two per row */
        }

        @media (max-width: 480px) {
            .timeline-item { width: 100%; } /* One per row */
        }
    </style>
</head>
<body>
    <app-header></app-header>
  <br><br>
    <h1 class="title"><span>Certifications</span></h1>

    <!-- Technical Certifications Section -->
    <h2 class="section-title">Technical Certifications</h2>
    <div class="timeline">
        <div class="timeline-item">
            <img src="../assets/certificate 2.jpg" alt="Web Development Using React Certificate" class="cert-img box1">
        </div>
        <!--  -->
    </div>

    <!-- Educational Certifications Section -->
    <h2 class="section-title">Educational Certifications</h2>
    <div class="timeline">
        <div class="timeline-item">
            <img src="../assets/tenth.jpg" alt="Degree Certificate" class="cert-img box4">
        </div>
        <div class="timeline-item">
            <img src="../assets/inter.jpg" alt="Diploma Certificate" class="cert-img box5">
        </div>
    </div>
