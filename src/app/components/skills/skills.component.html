<body style="background-color: black">
  <app-header></app-header>
  <br />
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Skills Section - Fixed Columns</title>
      <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
      />

      <style>
        body {
          background: #000;
          color: #fff;
          font-family: "Poppins", sans-serif;
        }

        .skills-section {
          padding: 50px;
        }

        .title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .title span {
            background: linear-gradient(to right, #00aaff, #ff4e50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .skills-section p {
          color: #ccc;
          margin-bottom: 30px;
        }

        .skills-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 20px;
        }

        /* Tablet & Mobile = 2 columns */
        @media (max-width: 992px) {
          .skills-grid {
            grid-template-columns: repeat(2, 1fr);
          }
        }

        /* Optional: if you want extra small screens like old phones */
        @media (max-width: 400px) {
          .skills-grid {
            grid-template-columns: repeat(2, 1fr);
          }
        }

        .skill-card {
          background: #111;
          border: 2px solid #000000;
          padding: 20px;
          border-radius: 10px;
          transition: transform 2s ease, border 0.6s ease, box-shadow 0.6s;
          cursor: pointer;
          box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
          text-align: center;
          background-color: black;
        }

        .skill-card img {
          width: 60px;
          margin-bottom: 10px;
          transition: transform 2s ease;
        }

        .skill-card p {
          margin: 0;
          font-weight: bold;
        }

        .html:hover {
          box-shadow: 0 0 10px orange;
        }
        .css:hover {
          box-shadow: 0 0 10px rgb(0, 208, 255);
        }
        .js:hover {
          box-shadow: 0 0 10px yellow;
        }
        .bootstrap:hover {
          box-shadow: 0 0 10px rgb(137, 2, 255);
        }
        .angular:hover {
          box-shadow: 0 0 10px rgb(255, 7, 180);
        }
        .git:hover {
          box-shadow: 0 0 10px rgb(255, 64, 0);
        }
        .sql:hover {
          box-shadow: 0 0 10px rgb(0, 191, 255);
        }
        .python:hover {
          box-shadow: 0 0 10px rgb(206, 206, 35);
        }
        .flask:hover {
          box-shadow: 0 0 10px rgb(0, 217, 255);
        }
        .ml:hover {
          box-shadow: 0 0 10px rgb(220, 217, 212);
        }
        .dl:hover {
          box-shadow: 0 0 10px rgb(255, 2, 141);
        }
        .ai:hover {
          box-shadow: 0 0 10px rgb(255, 128, 0);
        }
        .nlp:hover {
          box-shadow: 0 0 10px rgb(18, 53, 255);
        }

        .cc:hover {
          box-shadow: 0 0 10px rgb(195, 197, 207);
        }
        .pa:hover {
          box-shadow: 0 0 10px rgb(255, 0, 221);
        }

        .skill-card:hover img {
          transform: scale(1.2);
        }

        /* Floating animation for icons */
        @keyframes floating {
          0% {
            transform: translateY(0px);
          }
          50% {
            transform: translateY(-5px);
          }
          100% {
            transform: translateY(0px);
          }
        }

        .skill-card img {
          animation: floating 3s infinite ease-in-out;
        }

        /* Page load animation */
        @keyframes slideUp {
          0% {
            transform: translateY(50px);
            opacity: 0;
          }
          100% {
            transform: translateY(0);
            opacity: 1;
          }
        }

        .skill-card {
          opacity: 0;
          animation: slideUp 0.8s ease-in-out forwards;
        }

        /* Delay effect for each card */
        .skill-card:nth-child(1) {
          animation-delay: 0.1s;
        }
        .skill-card:nth-child(2) {
          animation-delay: 0.2s;
        }
        .skill-card:nth-child(3) {
          animation-delay: 0.3s;
        }
        .skill-card:nth-child(4) {
          animation-delay: 0.4s;
        }
        .skill-card:nth-child(5) {
          animation-delay: 0.5s;
        }
        .skill-card:nth-child(6) {
          animation-delay: 0.6s;
        }
        .skill-card:nth-child(7) {
          animation-delay: 0.7s;
        }
        .skill-card:nth-child(8) {
          animation-delay: 0.8s;
        }
        .skill-card:nth-child(9) {
          animation-delay: 0.9s;
        }
        .skill-card:nth-child(10) {
          animation-delay: 1s;
        }
        .skill-card:nth-child(11) {
          animation-delay: 1.1s;
        }
        .skill-card:nth-child(12) {
          animation-delay: 1.2s;
        }
        .skill-card:nth-child(13) {
          animation-delay: 1.3s;
        }

        
      </style>
    </head>

    <body>
      <section class="skills-section text-center">
        <h1 class="title"><span>Skills</span></h1>
        <p>Technologies I have worked with</p>

        <div class="skills-grid">
          <div class="skill-card html">
            <img
              src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg"
              alt="HTML"
            />
            <p>HTML</p>
          </div>

          <div class="skill-card css">
            <img
              src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg"
              alt="CSS"
            />
            <p>CSS</p>
          </div>

          <div class="skill-card js">
            <img
              src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg"
              alt="JavaScript"
            />
            <p>JavaScript</p>
          </div>

          <div class="skill-card bootstrap">
            <img
              src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/bootstrap/bootstrap-original.svg"
              alt="Bootstrap"
            />
            <p>Bootstrap</p>
          </div>
          <div class="skill-card angular">
            <img src="../assets/Angular.png" alt="Angular" />
            <p>Angular</p>
          </div>

          <div class="skill-card git">
            <img
              src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/git/git-original.svg"
              alt="GIT"
            />
            <p>GIT</p>
          </div>

          <div class="skill-card sql">
            <img src="../assets/sql.png" alt="SQL" />
            <p>SQL</p>
          </div>

          <div class="skill-card python">
            <img
              src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg"
              alt="Python"
            />
            <p>Python</p>
          </div>

          <div class="skill-card flask">
            <img src="../assets/flask.png" alt="Flask" />
            <p>Flask</p>
          </div>

          <div class="skill-card ml">
            <img
              src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
              alt="Machine Learning Robot"
              width="67"
              height="67"
            />
            <p>Machine Learning</p>
          </div>

          <div class="skill-card dl">
            <img
              src="../assets/dl.png"
              alt="Neural Network"
              width="67"
              height="67"
            />
            <p>Deep Learning</p>
          </div>

          <div class="skill-card ai">
            <img src="../assets/ai.png" alt="AI" />
            <p>AI</p>
          </div>

          <div class="skill-card nlp">
            <img src="../assets/nlp.png" alt="NLP" />
            <p>NLP</p>
          </div>
        </div>
      </section>

      <!-- Additional Skills Section -->
      <section class="skills-section text-center">
        <h1 class="title"><span>Additional Skills</span></h1>
        <p>More technologies I have experience with</p>

        <div class="skills-grid">
          <div class="skill-card cc">
            <img src="../assets/capcut.png" alt="capcut" />
            <p>Capcut</p>
          </div>
          <div class="skill-card pa">
            <img src="../assets/picsart.png" alt="picsart" />
            <p>PicsArt</p>
          </div>
        </div>
      </section>
    </body>
